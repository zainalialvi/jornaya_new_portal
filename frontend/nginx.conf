server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown path serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, or browsers keep loading the old bundle
    # after a rebuild (the hashed JS/CSS it references ARE safely cached below).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Static asset caching (filenames are content-hashed, so this is safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Cheap health endpoint for the container healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
